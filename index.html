<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UniqTrip · Costa do Descobrimento</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
:root {
  --green: #1B5E3A;
  --green-light: #EAF3EF;
  --gold: #C5A059;
  --gold-light: #d4b07a;
  --green-bg: #EAF3EF;
  --bg: #F7FAF9;
  --card-bg: #FFFFFF;
  --text: #1a1a1a;
  --text-light: #6b7280;
  --border: #e5e7eb;
  --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --shadow-hover: 0 4px 16px rgba(0,0,0,0.1);
  --radius: 12px;
  --radius-sm: 8px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}
h1, h2, h3, h4 {
  font-family: 'Cinzel', serif;
  font-weight: 600;
  color: var(--green);
  letter-spacing: 0.02em;
}
.container { max-width: 1120px; margin: 0 auto; padding: 0 24px; }

/* Header */
.header {
  background: #fff;
  color: var(--text);
  padding: 28px 0 24px;
  position: relative;
  overflow: hidden;
  border-bottom: 2px solid var(--green-bg);
}
.header .logo {
  font-family: 'Cinzel', serif;
  font-weight: 700;
  font-size: 1.1rem;
  letter-spacing: 0.06em;
  margin-bottom: 12px;
}


.header h1 {
  color: var(--green);
  font-size: clamp(1.5rem, 3vw, 2.2rem);
  margin-bottom: 4px;
}
.header .subtitulo {
  font-size: clamp(0.95rem, 1.5vw, 1.15rem);
  color: var(--text-light);
  font-weight: 300;
  margin-bottom: 20px;
}
.header .destinos-header {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 8px 4px;
  font-size: 0.9rem;
  color: var(--text-light);
}
.header .destinos-header .seta {
  color: var(--gold);
  margin: 0 4px;
  font-size: 0.75rem;
}
.header .tags {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 18px;
}
.header .tag {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: var(--green-bg);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 6px 14px;
  font-size: 0.78rem;
  color: var(--text);
}
.header .tag i { color: var(--gold); font-size: 0.7rem; }
.header .tag .badge {
  background: var(--gold);
  color: #fff;
  border-radius: 12px;
  padding: 2px 10px;
  font-weight: 700;
  font-size: 0.7rem;
  margin-left: 4px;
}

/* Mapa */
#mapa {
  height: 520px;
  width: 100%;
  border-radius: var(--radius);
  box-shadow: var(--shadow-hover);
  z-index: 1;
  position: relative;
  border: 2px solid #fff;
}
.map-wrapper { padding: 0 24px; }

/* Marcadores personalizados */
.marker-number {
  background: none;
  border: none;
}
.marker-circle {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  background: var(--green);
  border: 3px solid var(--gold);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Inter', sans-serif;
  font-weight: 700;
  font-size: 1rem;
  color: #fff;
  box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  transition: transform 0.2s;
}
.marker-circle:hover { transform: scale(1.12); }

.marker-circle.marker-origem {
  background: #6b7280;
  border-color: var(--gold);
  font-size: 0.7rem;
}
.marker-circle.end {
  background: var(--gold);
  border-color: var(--green);
}

/* Seções */
section { padding: 40px 0; }
.section-title {
  font-size: clamp(1.1rem, 1.8vw, 1.35rem);
  margin-bottom: 24px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.section-title i {
  color: var(--gold);
  font-size: 1.1rem;
  width: 28px;
  text-align: center;
}

/* Cards */
.cards-grid {
  display: grid;
  gap: 20px;
}
.card {
  background: var(--card-bg);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
  overflow: hidden;
  transition: box-shadow 0.3s;
}
.card:hover { box-shadow: var(--shadow-hover); }
.card-header {
  display: grid;
  grid-template-columns: auto 1fr auto auto;
  gap: 16px;
  padding: 20px 24px;
  align-items: center;
  cursor: pointer;
}
.card-expand {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  flex-shrink: 0;
  color: var(--gold);
  font-size: 0.65rem;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  cursor: pointer;
}
.card-expand i {
  transition: transform 0.3s;
  font-size: 0.8rem;
}
.card-body.open ~ .card-header .card-expand i {
  transform: rotate(180deg);
}
.card-highlights {
  display: flex;
  flex-wrap: wrap;
  gap: 4px 16px;
  margin-top: 8px;
}
.card-highlights span {
  font-size: 0.78rem;
  color: var(--text-light);
  line-height: 1.5;
  display: flex;
  align-items: center;
  gap: 5px;
}
.card-numero {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: var(--green);
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Cinzel', serif;
  font-weight: 700;
  font-size: 1.1rem;
  flex-shrink: 0;
}
.card-cidade h3 {
  font-size: 1.05rem;
  margin-bottom: 2px;
}
.card-cidade .noites {
.card-cidade .highlights {
  display: flex;
  flex-wrap: wrap;
  gap: 4px 16px;
  margin-top: 8px;
}
.card-cidade .highlights span {
  font-size: 0.78rem;
  color: var(--text-light);
  line-height: 1.5;
  display: flex;
  align-items: center;
  gap: 5px;
}
.card-body.open ~ .card-header [style*="chevron-down"] i,
.card-body.open + .card-header [style*="chevron-down"] i {
  transform: rotate(180deg);
}
  font-size: 0.82rem;
  color: var(--text-light);
}
.card-transporte {
  text-align: right;
  flex-shrink: 0;
}
.card-transporte .transporte-icon {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: var(--bg);
  padding: 6px 12px;
  border-radius: 20px;
  font-size: 0.78rem;
  color: var(--text-light);
  white-space: nowrap;
}
.card-transporte .transporte-icon i {
  color: var(--gold);
  font-size: 0.85rem;
}
.card-transporte .destino-label {
  font-size: 0.7rem;
  color: var(--text-light);
  margin-top: 2px;
}

/* Card expandido */
.card-body {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.4s ease, padding 0.3s ease;
  padding: 0 24px;
}
.card-body.open {
  max-height: 800px;
  padding: 0 24px 24px;
}
.card-body .grid-detalhes {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  border-top: 1px solid var(--border);
  padding-top: 20px;
}
.card-body .detalhe-item { font-size: 0.88rem; }
.card-body .detalhe-item h4 {
  font-family: 'Inter', sans-serif;
  font-weight: 600;
  font-size: 0.8rem;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-light);
  margin-bottom: 8px;
}
.card-body .detalhe-item h4 i {
  color: var(--gold);
  margin-right: 6px;
  width: 16px;
}
.card-body .detalhe-item ul {
  list-style: none;
  padding: 0;
}
.card-body .detalhe-item li {
  padding: 3px 0;
  font-size: 0.85rem;
  color: var(--text);
  line-height: 1.5;
}
.card-body .detalhe-item li::before {
  content: '-';
  color: var(--gold);
  margin-right: 8px;
  opacity: 0.6;
}
.card-body .detalhe-item .destaque {
  font-weight: 600;
  color: var(--green);
}
.btn-expand {
  background: none;
  border: none;
  cursor: pointer;
  color: var(--gold);
  font-size: 0.85rem;
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 8px 0;
  font-family: 'Inter', sans-serif;
  font-weight: 600;
  transition: color 0.2s;
}
.btn-expand:hover { color: var(--green); }
.btn-expand i { transition: transform 0.3s; }
.btn-expand.rotated i { transform: rotate(180deg); }

/* Transportes */
.transportes-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}
.transporte-card {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  display: flex;
  gap: 16px;
  align-items: flex-start;
}
.transporte-card .icon-wrap {
  width: 48px;
  height: 48px;
  border-radius: 50%;
  background: var(--bg);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  border: 1px solid var(--border);
}
.transporte-card .icon-wrap i { font-size: 1.2rem; color: var(--green); }
.transporte-card h4 { font-size: 0.95rem; margin-bottom: 4px; }
.transporte-card p { font-size: 0.82rem; color: var(--text-light); line-height: 1.5; }
.transporte-card .dica {
  margin-top: 8px;
  padding: 8px 12px;
  background: rgba(197,160,89,0.08);
  border-left: 3px solid var(--gold);
  border-radius: 4px;
  font-size: 0.8rem;
  color: var(--text);
}

/* Observações */
.obs-grid {
  display: grid;
  gap: 12px;
}
.obs-item {
  display: flex;
  gap: 12px;
  align-items: flex-start;
  padding: 16px 20px;
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
}
.obs-item i {
  color: var(--gold);
  font-size: 1rem;
  margin-top: 2px;
  flex-shrink: 0;
}
.obs-item p { font-size: 0.88rem; color: var(--text-light); line-height: 1.5; }
.obs-item strong { color: var(--text); }

/* Footer temático */
.footer-tematico {
  background: var(--green-bg);
  border-top: 2px solid var(--green);
  padding: 32px 0;
  margin-top: 20px;
}




/* Botão print */
.btn-print {
  position: fixed;
  bottom: 24px;
  right: 24px;
  background: var(--green);
  color: #fff;
  border: none;
  padding: 14px 24px;
  border-radius: 30px;
  font-family: 'Inter', sans-serif;
  font-weight: 600;
  font-size: 0.85rem;
  cursor: pointer;
  box-shadow: 0 4px 16px rgba(11,59,36,0.3);
  display: flex;
  align-items: center;
  gap: 10px;
  z-index: 1000;
  transition: all 0.3s;
}
.btn-print i { color: var(--gold); }
.btn-print:hover {
  background: var(--green-light);
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(11,59,36,0.4);
}

/* Distâncias tabela compacta */
.tabela-distancias {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.85rem;
  background: var(--card-bg);
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: var(--shadow);
}
.tabela-distancias th {
  background: var(--green);
  color: #fff;
  font-weight: 600;
  padding: 12px 16px;
  text-align: left;
  font-size: 0.78rem;
  text-transform: uppercase;
  letter-spacing: 0.06em;
}
.tabela-distancias td {
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
}
.tabela-distancias tr:nth-child(even) td { background: var(--bg); }
.tabela-distancias tr:last-child td { border-bottom: none; }
.tabela-distancias .total-row td {
  background: rgba(197,160,89,0.1);
  font-weight: 600;
  border-top: 2px solid var(--gold);
}

/* Responsivo */
@media (min-width: 768px) {
  .cards-grid { grid-template-columns: 1fr; }
  .card-body .grid-detalhes { grid-template-columns: 1fr 1fr; }
}
@media (max-width: 767px) {
  .card-header { grid-template-columns: auto 1fr; gap: 12px; }
  .card-transporte { grid-column: 1 / -1; text-align: left; }
  .card-body .grid-detalhes { grid-template-columns: 1fr; }
  .transportes-grid { grid-template-columns: 1fr; }
  #mapa { height: 360px; }
  .header { padding: 28px 0 24px; }
  /* .footer-tematico .grid { */ gap: 20px; }
}
@media (max-width: 480px) {
  .container { padding: 0 16px; }
  .btn-print { display: none; }
  #mapa { height: 300px; border-radius: var(--radius-sm); }
}

/* Print */
@media print {
  .btn-print { display: none; }
  .header { background: #fff !important; -webkit-print-color-adjust: exact; }
  .marker-circle, .card-numero, .tabela-distancias th, .footer-tematico { -webkit-print-color-adjust: exact; }
  #mapa { height: 200px; page-break-inside: avoid; }
  .card { break-inside: avoid; }
  .card-body.open { max-height: none !important; }
  .btn-expand { display: none; }
  .footer-tematico .item i { -webkit-print-color-adjust: exact; }
}

/* Cronograma */
.cronograma-dia {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  margin-bottom: 16px;
  overflow: hidden;
}
.cronograma-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 20px;
  background: var(--green-bg);
  border-bottom: 1px solid var(--border);
}
.cronograma-dia-label {
  font-family: 'Cinzel', serif;
  font-weight: 600;
  font-size: 0.9rem;
  color: var(--green);
}
.cronograma-cidade {
  font-size: 0.8rem;
  color: var(--text-light);
}
.cronograma-cidade i { margin-right: 4px; }
.cronograma-body { padding: 4px 0; }
.cronograma-row {
  display: flex;
  gap: 16px;
  padding: 8px 20px;
  border-bottom: 1px solid #f0f0f0;
  font-size: 0.85rem;
  line-height: 1.5;
}
.cronograma-row:last-child { border-bottom: none; }
.cronograma-hora {
  flex-shrink: 0;
  width: 56px;
  font-weight: 600;
  color: var(--green);
  font-family: 'Inter', monospace;
  font-size: 0.8rem;
}
.cronograma-atividade { color: var(--text); }

/* Orçamento */
.tabela-orcamento {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.85rem;
  background: var(--card-bg);
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: var(--shadow);
}
.tabela-orcamento th {
  background: var(--green);
  color: #fff;
  font-weight: 600;
  padding: 12px 16px;
  text-align: left;
  font-size: 0.78rem;
  text-transform: uppercase;
  letter-spacing: 0.06em;
}
.tabela-orcamento td {
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
}
.tabela-orcamento tr:nth-child(even) td { background: var(--green-bg); }
.tabela-orcamento tr:last-child td { border-bottom: none; }
.tabela-orcamento .total-row td {
  background: rgba(197,160,89,0.12);
  font-weight: 700;
  border-top: 2px solid var(--gold);
  color: var(--green);
}

/* Print - expand cronograma */
@media print {
  .cronograma-row { break-inside: avoid; }
  .cronograma-dia { break-inside: avoid; }
}

/* Badges */
.badge-base {
  display: inline-block;
  background: var(--gold);
  color: #fff;
  font-family: 'Inter', sans-serif;
  font-weight: 700;
  font-size: 0.6rem;
  padding: 2px 8px;
  border-radius: 4px;
  margin-left: 8px;
  vertical-align: middle;
  letter-spacing: 0.05em;
}
.base-fixa {
  display: inline-block;
  font-size: 0.7rem;
  color: var(--gold);
  font-weight: 500;
  margin-left: 8px;
}
@media (max-width: 767px) {
  .base-fixa { display: block; margin-left: 0; margin-top: 2px; }
}

/* Footer company info */
.footer-tematico {
  text-align: center;
}
.footer-tematico .footer-brand {
  font-family: 'Cinzel', serif;
  font-size: 1rem;
  color: var(--green);
  margin-bottom: 10px;
}
.footer-tematico .footer-company {
  font-size: 0.78rem;
  color: var(--text-light);
  font-weight: 500;
  margin-bottom: 6px;
}
.footer-tematico .footer-docs {
  font-size: 0.72rem;
  color: var(--text-light);
  margin-bottom: 4px;
}
.footer-tematico .footer-contact {
  font-size: 0.72rem;
  color: var(--text-light);
}

</style>
</head>
<body>

<header class="header">
  <div class="container">
    <div class="logo" style="color:var(--gold)">UniqTrip</div>
    <h1 id="titulo">Costa do Descobrimento</h1>
    <div class="subtitulo" id="subtitulo">Porto Seguro, Arraial d'Ajuda e Caraíva</div>
    <div class="destinos-header" id="destinos-header"></div>
    <div class="tags" id="perfil-tags"></div>
  </div>
</header>

<div class="map-wrapper">
  <div id="mapa"></div>
</div>

<section>
  <div class="container">
    <h2 class="section-title"><i class="fa-regular fa-map"></i> Distâncias</h2>
    <div id="tabela-distancias"></div>
  </div>
</section>

<section>
  <div class="container">
    <h2 class="section-title"><i class="fa-regular fa-calendar"></i> Roteiro</h2>
    <div class="cards-grid" id="cards-container"></div>
  </div>
</section>

<section id="sec-transportes">
  <div class="container">
    <h2 class="section-title"><i class="fa-solid fa-ship"></i> Transportes Especiais</h2>
    <div class="transportes-grid" id="transportes-container"></div>
  </div>
</section>

<section>
  <div class="container">
    <h2 class="section-title"><i class="fa-regular fa-calendar-clock"></i> Cronograma</h2>
    <div id="cronograma-container"></div>
  </div>
</section>

<section>
  <div class="container">
    <h2 class="section-title"><i class="fa-regular fa-coins"></i> Orçamento Estimado</h2>
    <p style="font-size:0.85rem;color:var(--text-light);margin-bottom:16px">Valores por pessoa, considerando quarto duplo</p>
    <table class="tabela-orcamento">
      <thead><tr><th>Item</th><th style="text-align:right">Custo</th></tr></thead>
      <tbody id="orcamento-container"></tbody>
    </table>
  </div>
</section>

<section>
  <div class="container">
    <h2 class="section-title"><i class="fa-regular fa-note-sticky"></i> Observações</h2>
    <div class="obs-grid" id="obs-container"></div>
  </div>
</section>

<footer class="footer-tematico">
  <div class="container">
    <div id="footer-temas"></div>
    
  </div>
</footer>

<button class="btn-print" onclick="window.print()">
  <i class="fa-regular fa-file-pdf"></i> Salvar PDF
</button>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ============================================================
// DADOS: Costa do Descobrimento
// ============================================================
const ROTEIRO = {

      { periodo: "Julho a outubro", descricao: "temporada de observação de baleias-jubarte" }
    ]
  },
  origem: "Vitória da Conquista",
  destinos: [
    {
      ordem: 1,

      noites: 1,
      dia: 1,
      coord: [-16.445, -39.065],
      foto: "",
      atracoes: [
        "Cidade Histórica (Cidade Alta)",
        "Marco do Descobrimento",
        "Igreja de Nossa Senhora da Pena",
        "Farol",
        "Passarela da Cultura",
        "Orla Norte"
      ],
      melhores_praias: [
        "Praia de Taperapuã",
        "Praia do Mutá",
        "Praia de Coroa Vermelha"
      ],
      passeios_opcionais: [],
      gastronomia: [
        "Moqueca baiana",
        "Peixes grelhados",
        "Barracas de praia tradicionais"
      ],
      por_do_sol: ["Orla da Cidade Histórica", "Passarela da Cultura"],
      dicas: []
    },
    {

  let html = `<i class="fa-solid fa-location-dot" style="color:var(--gold);font-size:0.75rem"></i> ${d.origem} `;
  nomes.forEach((nome, i) => {
    html += `<span class="seta"><i class="fa-solid fa-chevron-right"></i></span> ${nome}`;
  });
  html += ` <span class="seta"><i class="fa-solid fa-chevron-right"></i></span> ${d.origem} `;
  dh.innerHTML = html;

  // Tags
  const tags = document.getElementById('perfil-tags');
  tags.innerHTML = '';

  tags.innerHTML = idealHtml + nivelHtml;

function renderDistancias(d) {
  const el = document.getElementById('tabela-distancias');
  let rows = d.distancias.map(t =>
    `<tr><td>${t.trecho}</td><td>${t.distancia}</td><td>${t.tempo}</td></tr>`
  ).join('');

  // Calcular total
  let totalHoras = 0, totalMin = 0;
  d.distancias.forEach(t => {
    const p = t.tempo.match(/(\d+)h(?:\s*(\d+))?/);
    if (p) {
      totalHoras += parseInt(p[1]);
      if (p[2]) totalMin += parseInt(p[2]);
    }
  });
  totalHoras += Math.floor(totalMin / 60);
  totalMin = totalMin % 60;
  const totalTempo = totalHoras + 'h' + (totalMin > 0 ? totalMin + 'min' : '');

  el.innerHTML = `
    <table class="tabela-distancias">
      <thead><tr><th>Trecho</th><th>Distância</th><th>Tempo médio</th></tr></thead>
      <tbody>${rows}
        <tr class="total-row"><td><strong>Tempo total estimado</strong></td><td></td><td><strong>${totalTempo}</strong></td></tr>
      </tbody>
    </table>
  `;
}

function initMap(d) {
  const map = L.map('mapa', {
    zoomControl: true,
    scrollWheelZoom: true
  });

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; <a href="https://openstreetmap.org/copyright">OpenStreetMap</a>',
    maxZoom: 18
  }).addTo(map);

  const bounds = [];
  const markers = [];

  // Marcador de origem (Vitória da Conquista)
  const vdcIcon = L.divIcon({
    className: 'marker-number',
    html: '<div class="marker-circle marker-origem"><i class="fa-solid fa-house" style="font-size:0.85rem"></i></div>',
    iconSize: [40, 40],
    iconAnchor: [20, 20]
  });

  const vdcMarker = L.marker(d.origem_coord, { icon: vdcIcon })
    .addTo(map)
    .bindPopup(`
      <strong style="font-family:Cinzel;color:#0B3B24">${d.origem}</strong><br>
      <span style="font-size:0.8rem;color:#999">Partida e retorno</span>
    `, { closeButton: true, maxWidth: 200 });

  bounds.push(d.origem_coord);
  markers.push(vdcMarker);

  // Linha de ida: VDC → 1º destino
  L.polyline([d.origem_coord, d.destinos[0].coord], {
    color: '#C5A059',
    weight: 3,
    opacity: 0.8
  }).addTo(map);

  d.destinos.forEach((dest, idx) => {
    bounds.push(dest.coord);

    const isEnd = idx === d.destinos.length - 1;
    const icon = L.divIcon({
      className: 'marker-number',
      html: `<div class="marker-circle${isEnd ? ' end' : ''}">${dest.ordem}</div>`,
      iconSize: [40, 40],
      iconAnchor: [20, 20]
    });

    const marker = L.marker(dest.coord, { icon })
      .addTo(map)
      .bindPopup(`
        <strong style="font-family:Cinzel;color:#0B3B24">${dest.cidade}</strong><br>
        <span style="font-size:0.85rem;color:#666">
          <i class="fa-regular fa-moon" style="color:#C5A059"></i> ${dest.noites} noite${dest.noites > 1 ? 's' : ''} · Dia ${dest.dia}
        </span>
        <br><span style="font-size:0.8rem;color:#999">${d.nome}</span>
      `, { closeButton: true, maxWidth: 220 });

    markers.push(marker);

    // Linha entre destinos
    if (idx > 0) {
      const prev = d.destinos[idx - 1].coord;
      L.polyline([prev, dest.coord], {
        color: '#C5A059',
        weight: 3,
        opacity: 0.8,
        dashArray: idx === 1 ? null : '8, 6'
      }).addTo(map);
    }
  });

  // Linha de volta: último destino → VDC
  const ultimo = d.destinos[d.destinos.length - 1].coord;
  L.polyline([ultimo, d.origem_coord], {
    color: '#C5A059',
    weight: 2,
    opacity: 0.4,
    dashArray: '6, 8'
  }).addTo(map);

  // Ajustar zoom para incluir todos os pontos (inclusive VDC)
  const group = L.featureGroup(markers);
  map.fitBounds(group.getBounds().pad(0.25));

  // Forçar resize após render
  setTimeout(() => map.invalidateSize(), 300);
}

renderHeader(ROTEIRO);

  const firstBody = document.querySelector('.card .card-body');
  if (firstBody) firstBody.classList.add('open');
  // Init map after container has dimensions
  setTimeout(function() {
    initMap(ROTEIRO);
  }, 200);
});
</script>
